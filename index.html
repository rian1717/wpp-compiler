<script>
// ─── Typewriter effect ───
const lines = [
  '> Initializing W++ compiler engine...',
  '> Lexical scanning: token stream generated.',
  '> Syntax parsing: building AST tree...',
  '> Semantic analysis: checking types and scopes...',
  '> AST optimization: folding constants and dead code...',
  '> TAC generation: translating to Three-Address Code...',
  '> Ready.'
];
const el = document.getElementById('typewriter');
let li = 0, ci = 0;
function typeChar() {
  if (li >= lines.length) { el.innerHTML = lines[lines.length-1] + '<span class="cursor"></span>'; return; }
  const txt = lines.slice(0, li).join('  ') + (li > 0 ? '  ' : '') + lines[li].slice(0, ci + 1);
  el.innerHTML = txt + '<span class="cursor"></span>';
  ci++;
  if (ci >= lines[li].length) { li++; ci = 0; setTimeout(typeChar, 400); }
  else { setTimeout(typeChar, 40); }
}
setTimeout(typeChar, 600);

// ─── Theme toggle ───
const toggle = document.getElementById('themeToggle');
if (localStorage.getItem('wpp_theme') === 'light') { document.body.classList.add('light'); toggle.textContent = '☀'; }
toggle.addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  toggle.textContent = isLight ? '☀' : '🌙';
  localStorage.setItem('wpp_theme', isLight ? 'light' : 'dark');
});
</script>
